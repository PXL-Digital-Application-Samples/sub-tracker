services:
  frontend:
    build: ./frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
  backend:
    build: ./backend
    environment:
      DB_TYPE: postgres
      SESSION_SECRET: supersecret
      POSTGRES_HOST: postgres
      POSTGRES_USER: sub_user
      POSTGRES_PASSWORD: sub_pass
      POSTGRES_DB: sub_tracker
    depends_on:
      - postgres
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: sub_user
      POSTGRES_PASSWORD: sub_pass
      POSTGRES_DB: sub_tracker
    volumes:
      - pg-data:/var/lib/postgresql/data

volumes:
  pg-data:
