services:
  frontend:
    build: ./frontend
    ports:
      - "8080:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
  backend:
    build: ./backend
    ports:
      - "3000:3000"
    environment:
      DB_TYPE: sqlite
      SESSION_SECRET: ${SESSION_SECRET:?SESSION_SECRET is required}
    volumes:
      - backend-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  backend-data:
